<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRS Dev Studio | Acceso</title>
    <meta name="description" content="Acceso seguro a la plataforma profesional de costeo.">
    <link rel="icon" href="img/favicon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<main class="main-container">

    <div class="login-card">

        <div class="user-avatar">
            <img src="images/usuario.webp" alt="Usuario">
        </div>

        <div class="login-header">
            <h1>Acceso</h1>
            <p>Ingresa tus credenciales</p>
        </div>

        <form id="login-form" autocomplete="on">

            <!-- CORREO -->
            <div class="form-group">
                <label for="email">Correo</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="email" name="email" required>
                </div>
            </div>

            <!-- CONTRASEÑA -->
            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                    <i class="fa-solid fa-eye toggle-password" id="togglePassword"></i>
                </div>
            </div>

            <button type="submit" class="btn-login">
                Ingresar
            </button>

            <div class="forgot-password">
                ¿Olvidaste tu contraseña?<br>
                <a href="#" class="admin-contact">
                    Contactar al administrador
                </a>
            </div>

        </form>

    </div>

</main>

<!-- MODAL PERSONALIZADO -->
<div id="customModal" class="modal">
  <div class="modal-box">
    <div class="modal-icon">
      <i class="fa-solid fa-circle-exclamation"></i>
    </div>
    <h3>Atención</h3>
    <p>Mensaje</p>
    <button id="modalBtn">Aceptar</button>
  </div>
</div>

<script src="js/login.js"></script>
</body>
</html>
