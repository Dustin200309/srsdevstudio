<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="Panel administrativo de SRS Studio">
<meta name="robots" content="noindex, nofollow">

<title>Panel Administrativo | SRS Studio</title>

<link rel="stylesheet" href="css/admin.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="dashboard">

<!-- OVERLAY MOVIL -->
<div class="overlay" id="overlay"></div>

<!-- SIDEBAR -->

<aside class="sidebar" id="sidebar">

<div class="logo">
<img src="/images/negro.png" alt="Logo SRS Studio">
<h2>SRS Studio</h2>
</div>

<nav class="menu">

<a href="#" class="active">Dashboard</a>
<a href="#usuarios">Usuarios</a>
<a href="#notificaciones">Notificaciones</a>
<a href="">Chat usuarios</a>
<a href="#">Configuración</a>

</nav>

</aside>

<!-- CONTENIDO -->

<main class="main">

<header class="topbar">

<div class="topbar-left">

<button class="menu-toggle" id="menu-toggle">
☰
</button>

<div>
<h1 id="bienvenida">Panel Administrativo</h1>
<p class="subtitle">Gestión del sistema</p>
</div>

</div>

<button id="logout-btn" class="logout">
Cerrar sesión
</button>

</header>

<!-- ESTADÍSTICAS -->

<section class="stats">

<div class="card">
<h3>Usuarios activos</h3>
<h2 id="usuarios-activos">0</h2>
</div>

<div class="card">
<h3>Notificaciones enviadas</h3>
<h2 id="notificaciones-count">0</h2>
</div>

</section>

<!-- NOTIFICACIONES -->

<section class="panel" id="notificaciones">

<h2>Enviar notificación</h2>

<textarea
id="mensaje-notificacion"
placeholder="Escribe el mensaje..."
rows="4"
></textarea>

<button id="btn-enviar-notificacion">
Enviar notificación
</button>

</section>

<!-- CREAR USUARIO -->

<section class="panel" id="usuarios">

<h2>Crear nuevo usuario</h2>

<div class="form-grid">

<input type="text" id="nuevo-nombre" placeholder="Nombre">

<input type="email" id="nuevo-email" placeholder="Email">

<input type="password" id="nuevo-password" placeholder="Contraseña">

<select id="nuevo-rol">
<option value="cliente">Cliente</option>
<option value="admin">Administrador</option>
</select>

</div>

<button id="btn-crear-usuario">
Crear usuario
</button>

</section>

<!-- TABLA USUARIOS -->

<section class="panel">

<h2>Gestión de usuarios</h2>

<div class="table-container">

<table>

<thead>

<tr>
<th>ID</th>
<th>Nombre</th>
<th>Email</th>
<th>Rol</th>
<th>Estado</th>
<th>Acciones</th>
</tr>

</thead>

<tbody id="tabla-usuarios"></tbody>

</table>

</div>

</section>

<!-- CHAT ADMIN -->

<section class="panel chat-panel" id="chat">

<h2 id="chat-titulo">Chat con usuarios</h2>

<div class="chat-admin">

<!-- LISTA USUARIOS -->

<div class="chat-users">

<h3>Usuarios</h3>

<ul id="lista-usuarios">
<!-- usuarios cargados desde backend -->
</ul>

</div>

<!-- CHAT -->

<div class="chat-box">

<div class="chat-messages" id="chat-mensajes"></div>

<div class="chat-input">

<input 
type="text"
id="chat-mensaje"
placeholder="Responder al usuario..."
>

<button id="btn-enviar-chat">
Enviar
</button>

</div>

</div>

</div>

</section>

</main>

</div>

<script src="js/admin.js"></script>

</body>
</html>
