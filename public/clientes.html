<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Clientes</title>

    <meta name="theme-color" content="#8b5e3c">

    <link rel="stylesheet" href="css/clientes.css">
</head>

<body>

<header class="header">
    <button class="menu-btn" id="btnMenu">☰</button>
    <h1>Clientes</h1>
</header>

<main>
    <nav class="sidebar" id="sidebar">
        <ul>
            <li><a href="insumos.html">Insumos</a></li>
            <li><a href="packing.html">Empaques</a></li>
            <li><a href="intermedios.html">Productos Intermedios</a></li>
            <li><a href="recetas.html">Productos Terminados</a></li>
            <li><a href="intermedio_costeo.html">Costear Producto Intermedio</a></li>
            <li><a href="dashboard.html">Costear Producto Terminado</a></li>
            <li><a href="rentabilidad.html">Rentabilidad</a></li>
            <li><a href="clientes.html">Clientes</a></li>
            <li><a href="#" id="logoutBtn">Cerrar Sesión</a></li>
        </ul>
    </nav>

    <div class="grid-2">

        <!-- REGISTRAR CLIENTE -->
        <section class="card">
            <h2>Registrar Cliente</h2>
            <form id="registroCliente">
                <div class="form-group">
                    <label for="clienteNombre">Nombre</label>
                    <input type="text" id="clienteNombre" required>
                </div>

                <div class="form-group">
                    <label for="clienteTelefono">Teléfono</label>
                    <input type="tel"
                           id="clienteTelefono"
                           required
                           pattern="[0-9]{9}"
                           inputmode="numeric">
                </div>

                <button type="submit" class="btn-primary">
                    Guardar Cliente
                </button>
            </form>
        </section>

        <!-- REGISTRAR COMPRA -->
        <section class="card">
            <h2>Registrar Compra</h2>
            <form id="registroCompra">

                <div class="form-group">
                    <label for="clienteId">Cliente</label>
                    <select id="clienteId" required></select>
                </div>

                <div class="form-group">
                    <label for="descripcionCompra">Producto / Descripción</label>
                    <input type="text"
                           id="descripcionCompra"
                           placeholder="Ej: Torta de chocolate"
                           required>
                </div>

                <div class="form-group">
                    <label for="montoCompra">Monto (S/)</label>
                    <input type="number"
                           id="montoCompra"
                           step="0.01"
                           min="0.01"
                           required>
                </div>

                <button type="submit" class="btn-primary">
                    Registrar Compra
                </button>

            </form>
        </section>

    </div>

    <!-- LISTA CLIENTES -->
    <section class="card">
        <h2>Clientes Registrados</h2>
        <ul id="clientesLista"></ul>
    </section>

</main>

<!-- Agregar overlay -->
<div id="overlay"></div>

<script src="js/menu.js"></script>
<script src="js/clientes.js"></script>

</body>
</html>
