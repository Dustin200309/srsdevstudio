<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chat Admin | Panel Administrativo</title>

<meta name="description" content="Panel administrativo de chat para comunicación con usuarios del sistema">

<meta name="theme-color" content="#5c3a2e">

<link rel="icon" href="/favicon.ico">

<link rel="stylesheet" href="css/admin_chat.css">

</head>

<body>

<main class="chat-container">

    <!-- =========================
         LISTA DE USUARIOS
    ========================== -->

    <aside 
        class="usuarios-panel"
        aria-label="Lista de usuarios"
    >

        <header class="usuarios-header">
            <h2>Usuarios</h2>
        </header>

        <div
            id="usuariosList"
            class="usuarios-list"
            role="list"
        ></div>

    </aside>

    <!-- =========================
         PANEL DE CHAT
    ========================== -->

    <section 
        class="chat-panel"
        aria-label="Panel de conversación"
    >

        <!-- HEADER CHAT -->

        <header class="chat-header">

            <h3 id="usuarioActivo">
                Selecciona un usuario
            </h3>

        </header>

        <!-- MENSAJES -->

        <div
            class="chat-mensajes"
            id="chatMensajes"
            role="log"
            aria-live="polite"
            aria-relevant="additions"
        ></div>

        <!-- INPUT CHAT -->

        <form
            id="formMensaje"
            class="chat-form"
            autocomplete="off"
        >

            <input
                type="text"
                id="mensajeInput"
                placeholder="Escribe un mensaje..."
                aria-label="Escribir mensaje"
                maxlength="500"
                required
            >

            <button
                type="submit"
                aria-label="Enviar mensaje"
            >
                Enviar
            </button>

        </form>

    </section>

</main>

<script src="js/admin_chat.js" defer></script>

</body>
</html>
